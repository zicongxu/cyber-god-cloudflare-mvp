<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cyber God MVP Demo</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #101012;
        color: #f3efe6;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(720px, 100%);
        display: grid;
        gap: 16px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
      }

      textarea,
      input,
      button {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid #5f5a4b;
        border-radius: 8px;
        background: #18171b;
        color: inherit;
        font: inherit;
      }

      textarea,
      input {
        padding: 12px;
      }

      textarea {
        min-height: 112px;
        resize: vertical;
      }

      button {
        padding: 12px 14px;
        cursor: pointer;
        background: #d7b46a;
        color: #17130b;
        border-color: #d7b46a;
        font-weight: 700;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        padding: 16px;
        border: 1px solid #38342d;
        border-radius: 8px;
        background: #151417;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>赛博上帝 MVP Demo</h1>
      <input id="apiBase" value="http://localhost:8787" aria-label="API Base URL" />
      <textarea id="content">神啊，我今天刷了 3 小时短视频。</textarea>
      <button id="confess">提交忏悔</button>
      <button id="ritual">请求神明见证</button>
      <button id="confirm">诚实完成并结算</button>
      <pre id="output">等待召唤。</pre>
    </main>

    <script>
      const userId = "demo_user";
      const state = {};
      const output = document.querySelector("#output");

      function apiBase() {
        return document.querySelector("#apiBase").value.replace(/\/$/, "");
      }

      async function call(path, body) {
        const res = await fetch(`${apiBase()}${path}`, {
          method: "POST",
          headers: {
            "content-type": "application/json",
            "x-user-id": userId,
          },
          body: JSON.stringify(body),
        });
        const json = await res.json();
        output.textContent = JSON.stringify(json, null, 2);
        return json.data;
      }

      document.querySelector("#confess").addEventListener("click", async () => {
        const data = await call("/api/v1/confession-flows", {
          content: document.querySelector("#content").value,
          roast_level: 3,
        });
        state.flowId = data.flow_id;
        state.taskId = data.task.task_id;
      });

      document.querySelector("#ritual").addEventListener("click", async () => {
        await call(`/api/v1/tasks/${state.taskId}/completion-ritual`, {
          flow_id: state.flowId,
        });
      });

      document.querySelector("#confirm").addEventListener("click", async () => {
        await call(`/api/v1/tasks/${state.taskId}/self-confirm`, {
          flow_id: state.flowId,
          witness: { witness_type: "text", content: "Demo 已完成。" },
          self_confirmation_text: "我确认：这次救赎，我没有糊弄自己。",
        });
        await call(`/api/v1/tasks/${state.taskId}/settle`, {
          flow_id: state.flowId,
        });
      });
    </script>
  </body>
</html>
